name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: ci-secret
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/dainiknewtimes
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      POSTGRES_DB: dainiknewtimes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dainiknewtimes
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dainiknewtimes"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap database schema and seed baseline data
        env:
          NODE_ENV: development
          SEED_ADMIN_PASSWORD: ci-admin-password
        run: npm run seed

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm run audit:prod

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            set -e
            cd /home/deploy/dainiknewtimes
            git pull origin main
            npm ci
            npm run build
            pm2 restart dainiknewtimes --update-env
            pm2 save
